---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
    <p class="meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} &middot; {{ page.author }}{% endif %}</p>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
