# Site settings
title: Demi Yilmaz
description: "Curious, Mental Models, Exercise"
url: "https://demiculus.com"
github_username: demiculus

# Build settings
markdown: kramdown
permalink: pretty

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

kramdown:
  parse_block_html: true

# URLs excluded from /writing, related-posts, and the essay auto-scan.
# Format: leading and trailing slashes to match Jekyll's pretty permalinks.
essay_deny_urls:
