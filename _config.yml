  - /about/
  - /blog/
  - /writing/
  - /resume/
  - /cv/
  - /timer/
  - /30/
  - /breaking/
  - /general/
  - /goat/
  - /distribution/
  - /izmir_house/
  - /dropout/
  - /mmo/
  - /blog_checklist/
  - /decision_checklist/
  - /github_checklist/
  - /new_project_checklist/
  - /template-daily-update/
  - /404.html
  - /feed.xml
  - /atom.xml
  - /sitemap.xml
  - /robots.txt
